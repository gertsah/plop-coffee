    <!-- petal flower 2 -->
    <g transform="translate(420,330)">
      <path d="M0 -20 C 12 -26 22 -12 12 -4 C 24 -2 24 14 10 12 C 14 24 -2 28 -4 16 C -14 24 -26 10 -16 2 C -26 -2 -22 -18 -10 -12 C -10 -24 4 -28 0 -20 Z"/>
      <circle cx="-1" cy="-3" r="3.4"/>
