      <path d="M0 0 C 14 -14 32 -2 22 14 C 8 26 0 8 0 0 Z"/>
      <path d="M0 0 C -8 16 6 30 16 20 C 24 10 8 6 0 0 Z"/>
      <path d="M0 0 L 2 26"/>
