<svg xmlns="http://www.w3.org/2000/svg" width="520" height="520" viewBox="0 0 520 520">
  <g fill="none" stroke="#EAD9BC" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <!-- flower -->
    <g transform="translate(80,80)">
      <path d="M0 -22 C 14 -30 26 -14 14 -4 C 28 -2 28 16 12 14 C 18 28 0 32 -4 18 C -16 28 -28 12 -16 4 C -30 0 -26 -18 -10 -14 C -12 -28 6 -32 0 -22 Z"/>
      <circle cx="0" cy="-3" r="4"/>
