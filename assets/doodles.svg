    <!-- leaf sprig -->
    <g transform="translate(300,70)">
      <path d="M0 0 C 30 -10 54 6 70 40"/>
      <path d="M18 6 C 26 -6 40 -6 46 4 C 36 12 24 12 18 6 Z"/>
      <path d="M40 22 C 50 12 64 14 68 26 C 58 32 46 30 40 22 Z"/>
